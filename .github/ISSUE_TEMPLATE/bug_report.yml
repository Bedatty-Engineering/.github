name: Bug report
description: Report a reproducible problem
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Open this issue on the **repository where the bug lives** (not a random org repo). See [Support](https://github.com/Bedatty-Engineering/.github/blob/main/SUPPORT.md) if unsure.

        Fill in the fields below to make the problem reproducible.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: Describe the problem objectively.
      placeholder: What happened?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: List the steps needed to reproduce the problem.
      placeholder: |
        1. Go to...
        2. Click on...
        3. See the error...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      placeholder: What should have happened?
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Provide version, OS, browser, service, or any relevant context.
      placeholder: app v1.2.3, Ubuntu 24.04, Chrome 136
