name: Documentation
description: Fix or improve documentation (typos, gaps, clarity)
title: "[Docs]: "
labels:
  - documentation
body:
  - type: markdown
    attributes:
      value: |
        For **wrong behavior** or **missing features**, use **Bug report** or **Feature request**. This form is for **docs only** (readme, guides, comments).
  - type: textarea
    id: location
    attributes:
      label: Where
      description: File path, page, or section (and repository, if not this one).
      placeholder: e.g. README.md § Local development / modules-hub/…
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: What is wrong or missing
      description: What a reader would misunderstand or fail to find today.
    validations:
      required: true
  - type: textarea
    id: suggestion
    attributes:
      label: Suggested change *(optional)*
      description: Wording, structure, or a concrete edit if you already have one.
